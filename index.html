<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" href="/favicon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>socratink — a study tool for deep understanding</title>

    <!-- SEO -->
    <meta name="description" content="A study tool for deep understanding through reconstruction. Turn your material into a knowledge map, then rebuild ideas from memory." />

    <!-- Open Graph -->
    <meta property="og:title" content="socratink — a study tool for deep understanding" />
    <meta property="og:description" content="Deep understanding through reconstruction. Bring your own material. Rebuild one idea at a time from memory. The graph only moves when understanding is real." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="socratink — a study tool for deep understanding" />
    <meta name="twitter:description" content="Deep understanding through reconstruction. Bring your own material. Rebuild one idea at a time from memory. The graph only moves when understanding is real." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts: Geom (display), Manrope (fallback), Inter (body) — self-hosted,
         declared via @font-face in src/index.css -->
    <link rel="preload" href="/fonts/Geom-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/Inter-VariableFont_opsz,wght.ttf" as="font" type="font/ttf" crossorigin />
  </head>
  <body>
    <script>
      try {
        if (localStorage.getItem('learnops-theme') === 'dark') {
          document.documentElement.dataset.theme = 'dark';
          document.body.classList.add('night');
          document.body.dataset.theme = 'dark';
        }
      } catch (err) {
        console.warn('Theme preload skipped.', err);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
